<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-a-Sketch</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
</head>

<body>
    <h1>Etch-a-Sketch</h1>
    <div class="container">
        <div class="header">
            <button id="start">Start</button>
            <button id="reset" onclick="resetGrid()">Reset</button>
        </div>
        <div id="grid"></div>
    </div>

    <div id="grid-size" class="hidden">
        <div class="modal">
            <h2>Enter a number between 1 and 100.</h2>
            <input type="text" id="size" name="size">
            <button onclick="closeModal()">Enter</button>
        </div>
    </div>
</body>

</html>
